<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f8f9fa 0%, #f0f2f5 100%);
      color: #333;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 2rem 1.5rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #2c3e50;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #7f8c8d;
      font-weight: 400;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .iframe-wrapper {
      flex: 1;
      min-height: 700px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .iframe-wrapper iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 700px;
      border: none;
    }

    footer {
      padding: 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: #95a5a6;
      background: rgba(255, 255, 255, 0.6);
      border-top: 1px solid rgba(0, 0, 0, 0.04);
    }

    @media (max-width: 768px) {
      header {
        padding: 1rem 0.75rem;
      }

      h1 {
        font-size: 1rem;
      }

      main {
        padding: 0 0.75rem 0.75rem;
      }

      .iframe-wrapper {
        min-height: 700px;
        border-radius: 8px;
      }

      .iframe-wrapper iframe {
        min-height: 700px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>智能助手</h1>
    <p class="subtitle">随时为您解答问题，支持语音输入</p>
  </header>

  <main>
    <div class="iframe-wrapper">
      <!-- 部署时请将 src 改为你的公网 chatbot 地址，详见 DEPLOY.md -->
      <iframe
        src="https://udify.app/chatbot/3x3r790aj15437tB"
        frameborder="0"
        allow="microphone">
      </iframe>
    </div>
  </main>

  <footer>
    © 2025 · 智能助手
  </footer>
</body>
</html>
