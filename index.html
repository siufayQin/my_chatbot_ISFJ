<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f5f2;
      --card: #ffffff;
      --accent: #8b7355;
      --accent-light: #c4a77d;
      --text: #2d2a26;
      --text-muted: #6b6560;
      --border: rgba(139, 115, 85, 0.15);
    }

    html, body {
      height: 100%;
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 2.5rem 1.5rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.9) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: "Noto Serif SC", serif;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .accent-line {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      margin: 1rem auto 0;
      border-radius: 2px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .iframe-wrapper {
      flex: 1;
      min-height: 680px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(45, 42, 38, 0.08), 0 2px 8px rgba(45, 42, 38, 0.04);
      border: 1px solid var(--border);
    }

    .iframe-wrapper iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 680px;
      border: none;
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    @media (max-width: 768px) {
      header {
        padding: 1.5rem 1rem;
      }

      h1 {
        font-size: 1.35rem;
      }

      .subtitle {
        font-size: 0.85rem;
      }

      main {
        padding: 1.25rem 1rem;
      }

      .iframe-wrapper {
        min-height: 600px;
        border-radius: 12px;
      }

      .iframe-wrapper iframe {
        min-height: 600px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>智能助手</h1>
    <p class="subtitle">随时为您解答问题 · 支持语音输入</p>
    <div class="accent-line"></div>
  </header>

  <main>
    <div class="iframe-wrapper">
      <iframe
        src="https://udify.app/chatbot/3x3r790aj15437tB"
        frameborder="0"
        allow="microphone">
      </iframe>
    </div>
  </main>

  <footer>
    © 2025 智能助手
  </footer>
</body>
</html>
